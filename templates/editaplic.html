<!DOCTYPE html>
<!-- Defines this as an HTML5 document -->

<html lang="en">
<head>
    <!-- Metadata for the page -->

    <meta charset="UTF-8">
    <!-- Ensures correct character encoding -->

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Makes page responsive -->

    <title>Edit Job Submission</title>
    <!-- Title shown in browser tab -->

    <!-- Link to CSS styling -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style2.css') }}">

    <!-- Link to JavaScript file -->
    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</head>

<body>
    <!-- Main page container -->
    <div class="page">

        <!-- Page title -->
        <div class="title-box">
            <h1>Edit Job Submission</h1>
        </div>

        <!-- Display error or success message if exists -->
        {% if message %}
            <p class="message">{{ message }}</p>
        {% endif %}

        <!-- Instructions for the user -->
        <p class="info">
            Please fill out the form below to edit the details of your job application.
            Fields that are required are marked with a *.
        </p>

        <!-- Edit form -->
        <form method="POST" action="{{ url_for('edit_application', app_id=application['id']) }}">

            <!-- Company name -->
            <div class="form-block">
                <label>Company name *</label>
                <input type="text" name="company" value="{{ application['company'] }}" required>
            </div>

            <!-- Job role -->
            <div class="form-block">
                <label>Job Position *</label>
                <input type="text" name="role" value="{{ application['role'] }}" required>
            </div>

            <!-- Deadline -->
            <div class="form-block">
                <label>Application deadline *</label>
                <input type="date" name="deadline" value="{{ application['deadline'] }}" required>
            </div>

            <!-- Status dropdown -->
            <div class="form-block">
                <label>Application Status *</label>
                <select name="status" required>
                    <!-- Pre-selects current status -->
                    <option value="Applied" {% if application['status'] == 'Applied' %}selected{% endif %}>Applied</option>
                    <option value="Interview" {% if application['status'] == 'Interview' %}selected{% endif %}>Interview</option>
                    <option value="Offer" {% if application['status'] == 'Offer' %}selected{% endif %}>Offer</option>
                    <option value="Rejected" {% if application['status'] == 'Rejected' %}selected{% endif %}>Rejected</option>
                </select>
            </div>

            <!-- Optional Custom Status -->
        <div class="form-block">
            <label>Custom Status (optional)</label>
            <input 
                type="text" 
                name="custom_status" 
                placeholder="Enter a custom status" 
                value="{{ application['status'] if application['status'] not in ['Applied','Interview','Offer','Rejected'] else '' }}"
            >
            <small>If you enter a custom status, it will override the dropdown selection.</small>
        </div>

            <!-- Optional job URL -->
            <div class="form-block">
                <label>Job Listing URL (optional)</label>
                <input type="text" name="job_url" value="{{ application['job_url'] or '' }}">
            </div>

            <!-- Optional date applied -->
            <div class="form-block">
                <label>Date Applied (optional)</label>
                <input type="date" name="date_applied" value="{{ application['date_applied'] or '' }}">
            </div>

            <!-- Optional interview date -->
            <div class="form-block">
                <label>Interview Date (optional)</label>
                <input type="date" name="interview_date" value="{{ application['interview_date'] or '' }}">
            </div>

            <!-- Optional notes -->
            <div class="form-block">
                <label>Notes (optional)</label>
                <textarea name="notes">{{ application['notes'] or '' }}</textarea>
            </div>

            <!-- Optional cover letter -->
            <div class="form-block">
                <label>Cover Letter (optional)</label>
                <textarea name="cover_letter">{{ application['cover_letter'] or '' }}</textarea>
            </div>

            <!-- Action buttons -->
            <div class="buttons">
                <!-- Submit updated data -->
                <button type="submit" class="btn blue">Update</button>

                <!-- Cancel and go back to dashboard -->
                <a href="{{ url_for('dashboard') }}" class="btn orange">Cancel</a>
            </div>
        </form>

        <!-- Separate delete button -->
        <div class="buttons">
            <form method="POST" action="{{ url_for('delete_application', app_id=application['id']) }}" onsubmit="return confirmDelete();">
                <button type="submit" class="btn red">Delete</button>
            </form>
        </div>

    </div>
</body>
</html>
