<!DOCTYPE html>
<!-- Defines this as an HTML5 document -->

<html lang="en">
<head>
    <!-- Metadata for the page -->

    <meta charset="UTF-8">
    <!-- Ensures proper character encoding -->

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Makes the page responsive -->

    <title>Reset password</title>
    <!-- Title shown in browser tab -->

    <!-- Link to CSS file -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>
    <!-- Main container -->
    <div class="page">

        <!-- Page title -->
        <div class="title-box">
            <h1>Change your password</h1>
        </div>

        <!-- Instructions for user -->
        <p class="info">
            Enter a new password below to change your password.
        </p>

        <!-- Display message if there is an error or feedback -->
        {% if message %}
            <p class="message">{{ message }}</p>
        {% endif %}

        <!-- Reset password form -->
        <form method="POST" action="{{ url_for('reset_password') }}">

            <!-- Email input -->
            <div class="form-block">
                <label>Email address *</label>
                <input type="email" name="email" placeholder="Enter your email" required>
            </div>

            <!-- New password input -->
            <div class="form-block">
                <label>New password *</label>
                <input type="password" name="new_password" placeholder="Enter a new password" required>
            </div>

            <!-- Confirm password input -->
            <div class="form-block">
                <label>Re-enter new password *</label>
                <input type="password" name="confirm_password" placeholder="Confirm your new password" required>
            </div>

            <!-- Password requirement message -->
            <div class="info">
                Your password must contain at least 10 characters.
            </div>

            <!-- Submit button -->
            <div class="buttons">
                <button class="btn blue" type="submit">Reset password</button>
            </div>

        </form>
    </div>
</body>
</html>
